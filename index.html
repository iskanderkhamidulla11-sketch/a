<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunPay - Торговая площадка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding-bottom: 70px;
        }
        
        .header {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 20px;
            color: #2ecc71;
        }
        
        .theme-toggle {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 60px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tab-btn.active {
            color: #2ecc71;
            border-bottom: 2px solid #2ecc71;
        }
        
        .content {
            padding: 15px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .profile-info p {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .balance-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .balance-actions .btn {
            flex: 1;
            margin-top: 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 12px;
            position: relative;
        }
        
        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .deal-item {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 3px solid #2ecc71;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            z-index: 2000;
            white-space: nowrap;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .badge-success { background: #2ecc71; color: white; }
        .badge-warning { background: #f39c12; color: white; }
        .badge-danger { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 FunPay</h1>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="home">🏠 Главная</button>
        <button class="tab-btn" data-tab="profile">👤 Профиль</button>
        <button class="tab-btn" data-tab="deals">📋 Сделки</button>
    </div>

    <div class="content">
        <div id="home" class="tab-content active">
            <div class="card">
                <h2>Добро пожаловать в FunPay!</h2>
                <p style="margin-top: 10px;">Безопасные сделки между пользователями Telegram</p>
                <button class="btn" id="startBtn">Начать сделку</button>
            </div>
        </div>

        <div id="profile" class="tab-content">
            <div class="card">
                <h3>Профиль</h3>
                <div class="profile-info">
                    <p><strong>Имя:</strong> <span id="fullName">-</span></p>
                    <p><strong>Username:</strong> <span id="username">-</span></p>
                    <p><strong>Рейтинг:</strong> <span id="rating">0</span> ⭐</p>
                    <p><strong>Сделок:</strong> <span id="totalDeals">0</span></p>
                    <p><strong>Баланс:</strong> <span id="balance">0</span> ₽</p>
                </div>
                <div class="balance-actions">
                    <button class="btn" id="depositBtn">Пополнить</button>
                    <button class="btn" id="withdrawBtn">Вывести</button>
                </div>
            </div>
        </div>

        <div id="deals" class="tab-content">
            <button class="btn" id="newDealBtn">+ Создать сделку</button>
            <div id="dealsList">Загрузка...</div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Пополнение баланса</h3>
            <input type="number" id="depositAmount" placeholder="Сумма в рублях" min="100">
            <button class="btn" id="confirmDeposit">Оплатить</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Вывод средств</h3>
            <select id="withdrawMethod">
                <option value="card">На карту</option>
                <option value="usdt">USDT</option>
            </select>
            <input type="number" id="withdrawAmount" placeholder="Сумма">
            <input type="text" id="withdrawAddress" placeholder="Реквизиты">
            <button class="btn" id="confirmWithdraw">Вывести</button>
        </div>
    </div>

    <div id="newDealModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новая сделка</h3>
            <input type="text" id="sellerUsername" placeholder="Username продавца">
            <input type="text" id="productName" placeholder="Название товара">
            <input type="number" id="dealPrice" placeholder="Цена">
            <button class="btn" id="confirmDeal">Создать</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let userData = null;
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initButtons();
            loadUserData();
        });
        
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tabId).classList.add('active');
                    
                    if (tabId === 'profile') loadProfile();
                    if (tabId === 'deals') loadDeals();
                });
            });
        }
        
        function initButtons() {
            document.getElementById('startBtn')?.addEventListener('click', () => {
                document.querySelector('[data-tab="deals"]').click();
            });
            document.getElementById('newDealBtn')?.addEventListener('click', () => openModal('newDealModal'));
            document.getElementById('confirmDeal')?.addEventListener('click', createDeal);
            document.getElementById('depositBtn')?.addEventListener('click', () => openModal('depositModal'));
            document.getElementById('confirmDeposit')?.addEventListener('click', deposit);
            document.getElementById('withdrawBtn')?.addEventListener('click', () => openModal('withdrawModal'));
            document.getElementById('confirmWithdraw')?.addEventListener('click', withdraw);
            
            document.querySelectorAll('.close').forEach(close => {
                close.addEventListener('click', () => closeModals());
            });
            
            window.onclick = (event) => {
                if (event.target.classList.contains('modal')) closeModals();
            };
        }
        
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }
        
        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#e74c3c' : '#2ecc71';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }
        
        function loadUserData() {
            const initData = tg.initDataUnsafe;
            
            if (initData && initData.user) {
                userData = {
                    id: initData.user.id,
                    username: initData.user.username || `user_${initData.user.id}`,
                    fullName: `${initData.user.first_name || ''} ${initData.user.last_name || ''}`.trim() || 'Пользователь'
                };
            } else {
                userData = {
                    id: 123456789,
                    username: 'test_user',
                    fullName: 'Тестовый пользователь'
                };
            }
            
            loadFromStorage();
            loadProfile();
            loadDeals();
        }
        
        function loadFromStorage() {
            const saved = localStorage.getItem(`funpay_${userData.id}`);
            if (saved) {
                const data = JSON.parse(saved);
                userData.balance = data.balance || 1000;
                userData.rating = data.rating || 0;
                userData.totalDeals = data.totalDeals || 0;
            } else {
                userData.balance = 1000;
                userData.rating = 0;
                userData.totalDeals = 0;
                saveToStorage();
            }
        }
        
        function saveToStorage() {
            localStorage.setItem(`funpay_${userData.id}`, JSON.stringify({
                balance: userData.balance,
                rating: userData.rating,
                totalDeals: userData.totalDeals
            }));
        }
        
        function loadProfile() {
            document.getElementById('fullName').innerText = userData.fullName;
            document.getElementById('username').innerText = '@' + userData.username;
            document.getElementById('rating').innerText = userData.rating;
            document.getElementById('totalDeals').innerText = userData.totalDeals;
            document.getElementById('balance').innerText = userData.balance;
        }
        
        function loadDeals() {
            const deals = JSON.parse(localStorage.getItem(`deals_${userData.id}`) || '[]');
            
            if (deals.length === 0) {
                document.getElementById('dealsList').innerHTML = '<div class="card">Нет сделок</div>';
                return;
            }
            
            let html = '';
            deals.forEach(deal => {
                const statusClass = {
                    'pending': 'badge-warning',
                    'completed': 'badge-success',
                    'cancelled': 'badge-danger'
                }[deal.status] || 'badge-warning';
                
                const statusText = {
                    'pending': 'Ожидает',
                    'completed': 'Завершена',
                    'cancelled': 'Отменена'
                }[deal.status];
                
                html += `
                    <div class="deal-item">
                        <strong>${deal.product_name}</strong>
                        <span class="badge ${statusClass}" style="float: right">${statusText}</span>
                        <div style="margin-top: 8px;">💰 ${deal.price} ₽</div>
                        <div style="font-size: 12px; color: #666;">👤 @${deal.seller_username}</div>
                        ${deal.status === 'pending' ? `<button class="btn" style="margin-top: 10px;" onclick="completeDeal(${deal.id})">✅ Подтвердить</button>` : ''}
                    </div>
                `;
            });
            document.getElementById('dealsList').innerHTML = html;
        }
        
        function createDeal() {
            const seller = document.getElementById('sellerUsername').value.trim();
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('dealPrice').value);
            
            if (!seller || !name || !price) {
                showToast('Заполните все поля!', true);
                return;
            }
            
            if (price <= 0) {
                showToast('Цена должна быть больше 0', true);
                return;
            }
            
            if (userData.balance < price) {
                showToast('Недостаточно средств!', true);
                return;
            }
            
            const deals = JSON.parse(localStorage.getItem(`deals_${userData.id}`) || '[]');
            const newDeal = {
                id: Date.now(),
                seller_username: seller,
                product_name: name,
                price: price,
                status: 'pending',
                created_at: new Date().toISOString()
            };
            
            deals.unshift(newDeal);
            localStorage.setItem(`deals_${userData.id}`, JSON.stringify(deals));
            
            userData.balance -= price;
            saveToStorage();
            
            closeModals();
            showToast('Сделка создана!');
            loadProfile();
            loadDeals();
            
            document.getElementById('sellerUsername').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('dealPrice').value = '';
            
            tg.sendData(JSON.stringify({ type: 'new_deal', seller: seller, product: name, price: price }));
        }
        
        function completeDeal(dealId) {
            const deals = JSON.parse(localStorage.getItem(`deals_${userData.id}`) || '[]');
            const dealIndex = deals.findIndex(d => d.id === dealId);
            
            if (dealIndex !== -1 && deals[dealIndex].status === 'pending') {
                deals[dealIndex].status = 'completed';
                localStorage.setItem(`deals_${userData.id}`, JSON.stringify(deals));
                
                userData.totalDeals++;
                saveToStorage();
                
                showToast('Сделка завершена!');
                loadProfile();
                loadDeals();
            }
        }
        
        function deposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount < 100) {
                showToast('Минимальная сумма 100 ₽', true);
                return;
            }
            
            userData.balance += amount;
            saveToStorage();
            
            closeModals();
            showToast(`Баланс пополнен на ${amount} ₽`);
            loadProfile();
            
            document.getElementById('depositAmount').value = '';
            tg.sendData(JSON.stringify({ type: 'deposit', amount: amount }));
        }
        
        function withdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const address = document.getElementById('withdrawAddress').value.trim();
            
            if (!amount || amount < 100) {
                showToast('Минимальная сумма 100 ₽', true);
                return;
            }
            
            if (!address) {
                showToast('Введите реквизиты!', true);
                return;
            }
            
            if (userData.balance < amount) {
                showToast('Недостаточно средств!', true);
                return;
            }
            
            const fee = amount * 0.05;
            if (confirm(`Вывести ${amount} ₽?\nКомиссия: ${fee} ₽\nК получению: ${amount - fee} ₽`)) {
                userData.balance -= amount;
                saveToStorage();
                
                closeModals();
                showToast('Заявка отправлена!');
                loadProfile();
                
                tg.sendData(JSON.stringify({ type: 'withdraw', amount: amount, method: method, address: address }));
                
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawAddress').value = '';
            }
        }
        
        window.completeDeal = completeDeal;
    </script>
</body>
</html>
